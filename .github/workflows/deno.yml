name: Deno

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      # Pushgateway service container the pushgateway tests push to.
      pushgateway:
        image: prom/pushgateway
        ports:
          - 9091

    steps:
      - name: Setup repo
        uses: actions/checkout@v4

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          # v2.x reads the v4 deno.lock; older Deno cannot.
          deno-version: v2.x

      - name: Run tests
        run: deno test --allow-env --allow-net
        env:
          PUSHGATEWAY_HOST: localhost
          PUSHGATEWAY_PORT: ${{ job.services.pushgateway.ports['9091'] }}
